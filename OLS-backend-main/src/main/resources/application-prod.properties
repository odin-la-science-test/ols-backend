# ==============================================================================
# PROD PROFILE (Deployment)
# ==============================================================================

server.port=8080

jwt.secret=${JWT_SECRET}
jwt.access-token.expiration=900000
jwt.refresh-token.expiration=604800000

# --- DATABASE CONNECTION ---
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ols}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# --- JPA SAFETY ---
# 'validate' prevents Hibernate from altering the production schema
spring.jpa.hibernate.ddl-auto=validate
spring.sql.init.mode=never

# --- FLYWAY (schema migrations) ---
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# --- REDIS ---
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}

# --- LOGGING ---
spring.jpa.show-sql=false
logging.level.root=INFO

# --- SWAGGER (disabled in prod) ---
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# --- COOKIES (Prod - HTTPS) ---
cookie.secure=true

# --- CORS (Prod) ---
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://odinlascience.fr}

# --- RATE LIMITING (Prod - strict) ---
rate-limit.requests-per-minute=60
rate-limit.auth.requests-per-minute=5
rate-limit.auth.block-duration-minutes=15

# --- EMAIL (Prod - Infomaniak SMTP) ---
spring.mail.host=${MAIL_HOST:mail.infomaniak.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
mail.from-address=${MAIL_FROM:noreply@odinlascience.fr}
mail.enabled=true

# --- OAUTH2 (Prod - env vars) ---
oauth2.google.client-id=${GOOGLE_CLIENT_ID:}
oauth2.google.client-secret=${GOOGLE_CLIENT_SECRET:}
oauth2.google.redirect-uri=${GOOGLE_REDIRECT_URI:}
oauth2.cas.server-url=${CAS_SERVER_URL:https://cas.univ-lille.fr/cas}
oauth2.cas.service-url=${CAS_SERVICE_URL:}
oauth2.frontend-url=${FRONTEND_URL:https://odinlascience.fr}
