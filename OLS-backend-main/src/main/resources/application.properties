# ==============================================================================
# ODIN LA SCIENCE - GLOBAL CONFIGURATION
# ==============================================================================

spring.application.name=OLS-backend
spring.profiles.active=dev

# --- DATABASE DRIVER ---
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- CONNECTION POOL (HikariCP) ---
spring.datasource.hikari.maximum-pool-size=20

# --- ASYNC (SSE) ---
spring.mvc.async.request-timeout=300000

# --- QUICKSHARE ---
quickshare.upload-dir=./uploads/quickshare
quickshare.max-file-size=52428800

# --- FILE UPLOAD (Spring) ---
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# --- EMAIL ---
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
mail.from-name=Odin La Science

# --- CACHE (Redis) ---
spring.cache.type=redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
cache.ttl.reference-data=3600

# --- COOKIES ---
cookie.secure=false

# --- AI / TEXT CORRECTION ---
ai.languagetool.url=https://api.languagetool.org/v2
ai.languagetool.language=fr