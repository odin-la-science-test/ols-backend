<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>
<body style="margin:0;padding:0;background-color:#0f0f14;font-family:'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#0f0f14;padding:32px 16px;">
        <tr>
            <td align="center">
                <table role="presentation" width="560" cellpadding="0" cellspacing="0" style="background-color:#1a1a24;border-radius:12px;border:1px solid #2a2a3a;">
                    <!-- Header -->
                    <tr>
                        <td style="padding:28px 32px 20px;border-bottom:1px solid #2a2a3a;text-align:center;">
                            <span style="font-size:22px;font-weight:700;color:#e4e4ec;letter-spacing:-0.5px;">Odin La Science</span>
                        </td>
                    </tr>
                    <!-- Content (injected by child templates) -->
                    <tr>
                        <td style="padding:32px;" th:insert="${content}">
                        </td>
                    </tr>
                    <!-- Footer -->
                    <tr>
                        <td style="padding:20px 32px;border-top:1px solid #2a2a3a;text-align:center;">
                            <p style="margin:0;font-size:12px;color:#6b6b80;">
                                &copy; <span th:text="${#dates.format(#dates.createNow(), 'yyyy')}">2026</span> Odin La Science &mdash; Plateforme d'apprentissage en sciences
                            </p>
                            <p style="margin:6px 0 0;font-size:11px;color:#52526a;">
                                Cet email a ete envoye automatiquement, merci de ne pas y repondre.
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
