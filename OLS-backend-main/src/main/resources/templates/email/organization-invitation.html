<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8" /></head>
<body style="margin:0;padding:0;background-color:#0f0f14;font-family:'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#0f0f14;padding:32px 16px;">
        <tr><td align="center">
            <table role="presentation" width="560" cellpadding="0" cellspacing="0" style="background-color:#1a1a24;border-radius:12px;border:1px solid #2a2a3a;">
                <tr><td style="padding:28px 32px 20px;border-bottom:1px solid #2a2a3a;text-align:center;">
                    <span style="font-size:22px;font-weight:700;color:#e4e4ec;">Odin La Science</span>
                </td></tr>
                <tr><td style="padding:32px;">
                    <h2 style="margin:0 0 16px;font-size:20px;color:#e4e4ec;">Invitation a rejoindre une organisation</h2>
                    <p style="margin:0 0 8px;font-size:15px;color:#a0a0b8;">Bonjour,</p>
                    <p style="margin:0 0 24px;font-size:15px;color:#a0a0b8;">
                        <strong th:text="${inviterName}" style="color:#e4e4ec;">Quelqu'un</strong> vous a invite a rejoindre
                        l'organisation <strong th:text="${organizationName}" style="color:#e4e4ec;">Organisation</strong>
                        en tant que <strong th:text="${roleName}" style="color:#e4e4ec;">membre</strong>.
                    </p>
                    <table role="presentation" cellpadding="0" cellspacing="0" style="margin:0 auto;">
                        <tr><td style="background-color:#7c3aed;border-radius:8px;">
                            <a th:href="${actionUrl}" style="display:inline-block;padding:12px 32px;color:#ffffff;font-size:15px;font-weight:600;text-decoration:none;">Voir l'invitation</a>
                        </td></tr>
                    </table>
                </td></tr>
                <tr><td style="padding:20px 32px;border-top:1px solid #2a2a3a;text-align:center;">
                    <p style="margin:0;font-size:12px;color:#6b6b80;">&copy; 2026 Odin La Science</p>
                </td></tr>
            </table>
        </td></tr>
    </table>
</body>
</html>
