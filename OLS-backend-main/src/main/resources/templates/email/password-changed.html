<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8" /></head>
<body style="margin:0;padding:0;background-color:#0f0f14;font-family:'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#0f0f14;padding:32px 16px;">
        <tr><td align="center">
            <table role="presentation" width="560" cellpadding="0" cellspacing="0" style="background-color:#1a1a24;border-radius:12px;border:1px solid #2a2a3a;">
                <tr><td style="padding:28px 32px 20px;border-bottom:1px solid #2a2a3a;text-align:center;">
                    <span style="font-size:22px;font-weight:700;color:#e4e4ec;">Odin La Science</span>
                </td></tr>
                <tr><td style="padding:32px;">
                    <h2 style="margin:0 0 16px;font-size:20px;color:#e4e4ec;">Mot de passe modifie</h2>
                    <p style="margin:0 0 8px;font-size:15px;color:#a0a0b8;">Bonjour <span th:text="${firstName}" style="color:#e4e4ec;">utilisateur</span>,</p>
                    <p style="margin:0 0 24px;font-size:15px;color:#a0a0b8;">Votre mot de passe a ete modifie avec succes.</p>
                    <div style="background-color:#2a1a1a;border:1px solid #5c2a2a;border-radius:8px;padding:16px;margin-bottom:16px;">
                        <p style="margin:0;font-size:14px;color:#e8a0a0;">Si vous n'etes pas a l'origine de cette modification, contactez-nous immediatement et changez votre mot de passe.</p>
                    </div>
                </td></tr>
                <tr><td style="padding:20px 32px;border-top:1px solid #2a2a3a;text-align:center;">
                    <p style="margin:0;font-size:12px;color:#6b6b80;">&copy; 2026 Odin La Science</p>
                </td></tr>
            </table>
        </td></tr>
    </table>
</body>
</html>
