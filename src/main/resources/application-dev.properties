# ==============================================================================
# DEV PROFILE (Local Environment)
# ==============================================================================

server.port=8080

jwt.secret=2y8vQ9nF6sT3aVb1xZp4Kc7mR0uH5dL2oN3wYq8jB6E=
jwt.access-token.expiration=86400000
jwt.refresh-token.expiration=604800000

# --- DATABASE CONNECTION (Local Service) ---
spring.datasource.url=jdbc:postgresql://localhost:5432/ols
spring.datasource.username=postgres
spring.datasource.password=postgres

# --- JPA & DATA INIT ---
# 'create-drop' ensures a clean state at every restart for testing
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# --- LOGGING & DEBUG ---
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Trace binding parameters to see actual values in SQL logs
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# --- CORS (Dev) ---
cors.allowed-origins=http://localhost:3000,http://localhost:5500,http://127.0.0.1:5500

# --- RATE LIMITING (Dev - plus permissif pour les tests) ---
rate-limit.requests-per-minute=10000
rate-limit.auth.requests-per-minute=1000
rate-limit.auth.block-duration-minutes=1

# --- OAUTH2 (Dev placeholders - a remplir quand la SAS sera creee) ---
oauth2.google.client-id=PLACEHOLDER_GOOGLE_CLIENT_ID
oauth2.google.client-secret=PLACEHOLDER_GOOGLE_CLIENT_SECRET
oauth2.google.redirect-uri=http://localhost:8080/api/auth/oauth2/google/callback
oauth2.cas.server-url=https://cas.univ-lille.fr/cas
oauth2.cas.service-url=http://localhost:8080/api/auth/cas/callback
oauth2.frontend-url=http://localhost:3000