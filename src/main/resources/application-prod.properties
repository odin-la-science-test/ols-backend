# ==============================================================================
# PROD PROFILE (Deployment)
# ==============================================================================

server.port=8080

jwt.secret=${JWT_SECRET}
jwt.access-token.expiration=900000
jwt.refresh-token.expiration=604800000

# --- DATABASE CONNECTION ---
# Option 1: PostgreSQL (Render managed database)
# spring.datasource.url=${DATABASE_URL}
# spring.datasource.username=${DB_USERNAME}
# spring.datasource.password=${DB_PASSWORD}

# Option 2: H2 in-memory (pour test rapide, non recommandé en prod)
spring.datasource.url=jdbc:h2:mem:olsdb
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# --- JPA SAFETY ---
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=always

# --- LOGGING ---
spring.jpa.show-sql=false
logging.level.root=INFO

# --- CORS (Prod) ---
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://odinlascience.com}

# --- RATE LIMITING (Prod - strict) ---
rate-limit.requests-per-minute=60
rate-limit.auth.requests-per-minute=5
rate-limit.auth.block-duration-minutes=15